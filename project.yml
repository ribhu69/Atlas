name: AtlasFiles

options:
  bundleIdPrefix: com.ribhu69
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top
  tabWidth: 4
  indentWidth: 4

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: true
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true

targets:
  AtlasFiles:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Atlas
        excludes:
          - "**/.DS_Store"

    info:
      path: AtlasFiles/Info.plist
      properties:
        CFBundleDisplayName: Atlas Files
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        NSUbiquitousContainers:
          iCloud.com.ribhu69.atlasfiles:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Atlas Files
            NSUbiquitousContainerSupportedFolderLevels: Any
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.atlas.files
            CFBundleURLName: com.ribhu69.atlasfiles
        NSPhotoLibraryUsageDescription: Used to import photos into Atlas Files
        NSCameraUsageDescription: Used to capture photos to save to your files
        NSLocalNetworkUsageDescription: Used to connect to local FTP and WebDAV servers
        ITSAppUsesNonExemptEncryption: false

    entitlements:
      path: AtlasFiles/AtlasFiles.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ribhu69.atlasfiles
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ribhu69.atlasfiles
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.ribhu69.atlasfiles

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ribhu69.atlasfiles
        PRODUCT_NAME: AtlasFiles
        INFOPLIST_FILE: AtlasFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: AtlasFiles/AtlasFiles.entitlements
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: true
